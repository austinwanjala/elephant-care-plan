  <script>
    // Fallback mock ONLY if the real WebSdk script failed to load
    if (typeof window.WebSdk === 'undefined') {
      console.warn('Real DigitalPersona WebSdk not loaded. Using fallback mock – fingerprint capture will not work.');
      window.WebSdk = {
        WebChannelOptions: class { constructor() {} },
        WebChannelClient: class {
          constructor() {}
          onConnectionFailed() {}
          onConnectionSucceed() {}
          onDataReceivedBin() {}
          onDataReceivedTxt() {}
          connect() {
            console.error('WebSdk fallback: real service not available.');
            setTimeout(() => { if (typeof this.onConnectionFailed === 'function') this.onConnectionFailed(); }, 100);
          }
          disconnect() {}
          sendDataBin() {}
          sendDataTxt() {}
          isConnected() { return false; }
        }
      };
    }
  </script>
