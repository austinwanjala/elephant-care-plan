  <script>
    // Define a mock WebSdk to prevent "WebSdk is not defined" errors
    // from DigitalPersona when the service isn't locally running.
    window.WebSdk = {
      WebChannelOptions: class { constructor() {} },
      WebChannelClient: class {
        constructor() {}
        onConnectionFailed() {}
        onConnectionSucceed() {}
        onDataReceivedBin() {}
        onDataReceivedTxt() {}
        connect() {
          console.warn("Using mocked WebSdk. Triggering failure fallback.");
          setTimeout(() => { if (this.onConnectionFailed) this.onConnectionFailed(); }, 100);
        }
        disconnect() {}
        sendDataBin() {}
        sendDataTxt() {}
        isConnected() { return false; }
      }
    };
  </script>
